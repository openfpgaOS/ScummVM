# openfpgaOS SDK — MiSTer platform metadata (sourced by scripts/release.sh).
PLATFORM_PRODUCT="MiSTer"            # shown in the release title
PLATFORM_TAG_SUFFIX="-mister"        # git tag = <core>-mister-v<ver>
PLATFORM_BUNDLE_KIND="image"         # build/<t>/<core>/ = per-game bundle (boot.vhd + saves + .mgl + loose ELF)
PLATFORM_COREJSON="dist"             # bundle has no core.json; read dist/<core>/Cores/
